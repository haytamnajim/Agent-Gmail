<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Gmail</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #f6f7f9;
            --panel: #ffffff;
            --text: #172033;
            --muted: #697386;
            --border: #d9dee8;
            --accent: #1769e0;
            --accent-dark: #0f55bd;
            --danger: #b42318;
            --danger-dark: #8f1d14;
            --success: #127a43;
            --error: #c12a2a;
            --shadow: 0 16px 40px rgba(23, 32, 51, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            font-family: Arial, Helvetica, sans-serif;
            line-height: 1.5;
        }

        main {
            width: min(1280px, calc(100% - 32px));
            margin: 0 auto;
            padding: 40px 0;
        }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
        }

        h1 {
            margin: 0;
            font-size: 32px;
            font-weight: 700;
            letter-spacing: 0;
        }

        .status {
            min-width: 148px;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel);
            color: var(--muted);
            text-align: center;
            font-weight: 700;
        }

        .status.running {
            color: var(--accent);
            border-color: rgba(23, 105, 224, 0.35);
        }

        .status.done {
            color: var(--success);
            border-color: rgba(18, 122, 67, 0.35);
        }

        .status.error {
            color: var(--error);
            border-color: rgba(193, 42, 42, 0.35);
        }

        .actions {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        button {
            min-height: 44px;
            min-width: 120px;
            border: 0;
            border-radius: 8px;
            background: var(--accent);
            color: #ffffff;
            padding: 0 18px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: var(--accent-dark);
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.65;
        }

        .stop-button {
            background: var(--danger);
        }

        .stop-button:hover {
            background: var(--danger-dark);
        }

        .layout {
            display: grid;
            grid-template-columns: 320px minmax(0, 1fr) minmax(280px, 340px);
            align-items: stretch;
            gap: 20px;
        }

        .panel-header-with-actions {
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            padding-right: 12px;
        }

        .panel-header-with-actions h2 {
            border-bottom: 0 !important;
        }

        .refresh-button {
            background: transparent;
            border: 0;
            color: var(--muted);
            min-width: unset;
            min-height: unset;
            padding: 8px;
            cursor: pointer;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
        }

        .refresh-button:hover {
            background: #edf0f5;
            color: var(--accent);
        }

        .refresh-button:active svg {
            transform: rotate(180deg);
        }

        .refresh-button svg {
            transition: transform 0.3s ease;
        }

        .inbox-list {
            flex: 1;
            overflow-y: auto;
            max-height: 680px;
            background: #fbfbfc;
        }

        .inbox-placeholder {
            padding: 24px;
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            font-style: italic;
        }

        .inbox-item {
            padding: 14px 16px;
            border-bottom: 1px solid #edf0f5;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 4px;
            text-align: left;
        }

        .inbox-item:last-child {
            border-bottom: 0;
        }

        .inbox-item:hover {
            background: #f1f4f9;
        }

        .inbox-item.active {
            background: #e8f0fe;
            border-left: 4px solid var(--accent);
            padding-left: 12px;
        }

        .inbox-item-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
        }

        .inbox-item-sender {
            font-weight: 700;
            font-size: 14px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 180px;
        }

        .inbox-item-time {
            font-size: 11px;
            color: var(--muted);
            white-space: nowrap;
        }

        .inbox-item-subject {
            font-weight: 600;
            font-size: 13px;
            color: #2b3447;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .inbox-item-snippet {
            font-size: 12px;
            color: var(--muted);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.4;
        }

        .inbox-item.demo-badge::after {
            content: "Demo";
            position: absolute;
            right: 16px;
            bottom: 8px;
            font-size: 9px;
            background: rgba(23, 105, 224, 0.1);
            color: var(--accent);
            padding: 1px 5px;
            border-radius: 4px;
            font-weight: 700;
        }

        .panel,
        .card {
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        .panel {
            display: flex;
            flex-direction: column;
            min-height: 100%;
            overflow: hidden;
        }

        .panel h2,
        .card h2 {
            margin: 0;
            padding: 16px 18px;
            border-bottom: 1px solid var(--border);
            font-size: 18px;
        }

        .log {
            flex: 1;
            min-height: 240px;
            max-height: 680px;
            overflow: auto;
            padding: 12px;
        }

        .step {
            display: grid;
            grid-template-columns: 48px minmax(0, 1fr);
            gap: 10px;
            padding: 11px 10px;
            border-bottom: 1px solid #edf0f5;
        }

        .step:last-child {
            border-bottom: 0;
        }

        .step.error {
            color: var(--error);
            background: #fff4f4;
        }

        .badge {
            font-size: 12px;
            line-height: 1.4;
            text-align: center;
            font-weight: 700;
            color: var(--muted);
        }

        .message {
            margin: 0;
            font-weight: 700;
            overflow-wrap: anywhere;
        }

        .time {
            display: block;
            margin-top: 3px;
            color: var(--muted);
            font-size: 12px;
            font-weight: 400;
        }

        .cards {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .content {
            min-height: 260px;
            max-height: 360px;
            overflow: auto;
            padding: 16px 18px;
            color: #2b3447;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }

        .placeholder {
            color: var(--muted);
        }

        @media (max-width: 1024px) {
            header,
            .layout {
                grid-template-columns: 1fr;
            }

            .log,
            .inbox-list {
                min-height: 220px;
                max-height: 320px;
            }

            header {
                align-items: flex-start;
                flex-direction: column;
            }

            .status {
                width: 100%;
            }

            .actions {
                width: 100%;
            }

            button {
                flex: 1;
            }
        }
    </style>
</head>
<body>
<main>
    <header>
        <h1>Agent Gmail</h1>
        <div id="status" class="status">Arrete</div>
    </header>

    <div class="actions">
        <button id="startButton" type="button">Demarrer</button>
        <button id="stopButton" class="stop-button" type="button">Arreter</button>
    </div>

    <section class="layout">
        <!-- New Inbox Viewer Panel -->
        <div class="panel">
            <div class="panel-header-with-actions">
                <h2>Boite de reception</h2>
                <button id="refreshInboxButton" class="refresh-button" type="button" title="Rafraichir la boite de reception">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M23 4v6h-6M1 20v-6h6"></path>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                </button>
            </div>
            <div id="inboxList" class="inbox-list">
                <div class="inbox-placeholder">Chargement des e-mails...</div>
            </div>
        </div>

        <div class="cards">
            <article class="card">
                <h2>Email recu</h2>
                <div id="emailContent" class="content placeholder">En attente d'un email principal...</div>
            </article>

            <article class="card">
                <h2>Reponse envoyee</h2>
                <div id="replyContent" class="content placeholder">La reponse generee apparaitra ici.</div>
            </article>
        </div>

        <div class="panel">
            <h2>Communication de l'agent</h2>
            <div id="log" class="log" aria-live="polite"></div>
        </div>
    </section>
</main>

<script>
    const startButton = document.getElementById('startButton');
    const stopButton = document.getElementById('stopButton');
    const log = document.getElementById('log');
    const statusLabel = document.getElementById('status');
    const emailContent = document.getElementById('emailContent');
    const replyContent = document.getElementById('replyContent');
    const refreshInboxButton = document.getElementById('refreshInboxButton');
    const inboxList = document.getElementById('inboxList');

    startButton.addEventListener('click', () => command('/agent/start'));
    stopButton.addEventListener('click', () => command('/agent/stop'));
    refreshInboxButton.addEventListener('click', loadInbox);

    loadStatus();
    connectEvents();
    loadInbox();

    async function command(url) {
        startButton.disabled = true;
        stopButton.disabled = true;

        try {
            const response = await fetch(url, { method: 'POST' });
            applyStatus(await response.json());
        } catch (error) {
            appendStep({
                emoji: 'ERR',
                message: 'Commande impossible: ' + error.message,
                timestamp: new Date().toISOString(),
                type: 'error'
            });
            setStatus('Erreur', 'error');
        } finally {
            await loadStatus();
        }
    }

    async function loadStatus() {
        try {
            const response = await fetch('/agent/status');
            applyStatus(await response.json());
        } catch (error) {
            setStatus('Indisponible', 'error');
            startButton.disabled = false;
            stopButton.disabled = true;
        }
    }

    function applyStatus(status) {
        if (status.active) {
            setStatus(status.running ? 'En traitement' : 'Actif', 'running');
            startButton.disabled = true;
            stopButton.disabled = false;
        } else {
            setStatus('Arrete', 'done');
            startButton.disabled = false;
            stopButton.disabled = true;
        }
    }

    async function loadInbox() {
        const svg = refreshInboxButton.querySelector('svg');
        svg.style.transform = 'rotate(360deg)';
        setTimeout(() => svg.style.transform = 'none', 600);

        try {
            const response = await fetch('/agent/emails');
            const emails = await response.json();
            renderInbox(emails);
        } catch (error) {
            inboxList.innerHTML = `<div class="inbox-placeholder text-danger">Erreur: ${error.message}</div>`;
        }
    }

    function renderInbox(emails) {
        if (!emails || emails.length === 0) {
            inboxList.innerHTML = '<div class="inbox-placeholder">Aucun e-mail trouve.</div>';
            return;
        }

        inboxList.innerHTML = '';
        emails.forEach((email) => {
            const item = document.createElement('div');
            const isDemo = email.id.startsWith('demo-');
            item.className = `inbox-item ${isDemo ? 'demo-badge' : ''}`;
            item.dataset.id = email.id;

            // Format time nicely
            const timeStr = formatTime(email.internalDateMillis);

            item.innerHTML = `
                <div class="inbox-item-header">
                    <span class="inbox-item-sender" title="${escapeHtml(email.from)}">${escapeHtml(email.from.split('<')[0].trim())}</span>
                    <span class="inbox-item-time">${timeStr}</span>
                </div>
                <div class="inbox-item-subject" title="${escapeHtml(email.subject)}">${escapeHtml(email.subject)}</div>
                <div class="inbox-item-snippet">${escapeHtml(email.body || '')}</div>
            `;

            item.addEventListener('click', () => {
                // Set active state
                document.querySelectorAll('.inbox-item').forEach(el => el.classList.remove('active'));
                item.classList.add('active');

                // Display content
                setContent(emailContent, email.body, false);
                setContent(replyContent, "Cliquez sur \"Demarrer\" pour faire repondre l'agent a cet e-mail automatiquement, ou attendez le prochain scan.", true);
                
                // Highlight active email header
                const activeCardHeader = document.querySelector('.cards .card:first-child h2');
                activeCardHeader.textContent = `Email recu - De : ${email.from.split('<')[0].trim()}`;
            });

            inboxList.appendChild(item);
        });
    }

    function escapeHtml(text) {
        if (!text) return '';
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function connectEvents() {
        const source = new EventSource('/events');

        source.addEventListener('step', (event) => {
            const step = JSON.parse(event.data);
            appendStep(step);

            if (step.emailContent) {
                setContent(emailContent, step.emailContent, false);
            }

            if (step.generatedReply) {
                setContent(replyContent, step.generatedReply, false);
            }

            if (step.type === 'error') {
                setStatus('Erreur', 'error');
            }

            loadStatus();
            // Automatically refresh inbox when a cycle finishes
            if (step.emoji === 'DONE' || step.emoji === 'SEND') {
                loadInbox();
            }
        });

        source.onerror = () => {
            appendStep({
                emoji: 'ERR',
                message: 'Flux agent interrompu. Reconnexion en cours...',
                timestamp: new Date().toISOString(),
                type: 'error'
            });
        };
    }

    function appendStep(step) {
        const row = document.createElement('div');
        row.className = `step ${step.type === 'error' ? 'error' : ''}`;

        const badge = document.createElement('div');
        badge.className = 'badge';
        badge.textContent = step.emoji;

        const body = document.createElement('div');
        const message = document.createElement('p');
        message.className = 'message';
        message.textContent = step.message;

        const time = document.createElement('span');
        time.className = 'time';
        time.textContent = formatTime(step.timestamp);

        body.appendChild(message);
        body.appendChild(time);
        row.appendChild(badge);
        row.appendChild(body);
        log.appendChild(row);
        log.scrollTop = log.scrollHeight;
    }

    function setContent(element, value, placeholder) {
        element.textContent = value;
        element.classList.toggle('placeholder', placeholder);
    }

    function setStatus(text, className) {
        statusLabel.textContent = text;
        statusLabel.className = `status ${className}`;
    }

    function formatTime(timestamp) {
        return new Intl.DateTimeFormat('fr-FR', {
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        }).format(new Date(timestamp));
    }
</script>
</body>
</html>
